# .github/workflows/update_data.yml

name: Atualização Automática de Dados da Frota

# Gatilho (Trigger): Como o workflow é iniciado
on:
  # Permite rodar manualmente pela interface do GitHub (ótimo para testes)
  workflow_dispatch:
  
  # Agendamento: Roda automaticamente em um intervalo definido
  schedule:
    # Roda a cada 6 horas. A sintaxe é 'cron'.
    # '0 */6 * * *' significa: no minuto 0, a cada 6 horas, todos os dias.
    - cron: '0 */6 * * *'

jobs:
  update-data:
    runs-on: ubuntu-latest # Usa uma máquina virtual Linux

    steps:
      # Passo 1: Baixa o código do seu repositório
      - name: Checkout do repositório
        uses: actions/checkout@v3

      # Passo 2: Configura o ambiente Python
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # Use a mesma versão que você usa localmente

      # Passo 3: Instala as dependências
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Passo 4: Executa o pipeline para gerar o arquivo de dados
      # Adicionamos 'continue-on-error: true' para que o workflow não pare se o pipeline falhar
      # (por exemplo, se a chave da API for inválida)
      - name: Rodar o pipeline de dados
        id: run_pipeline # Damos um ID a este passo para verificar seu resultado depois
        continue-on-error: true
        run: python pipeline.py
        env:
          # Mapeia o GitHub Secret para a variável de ambiente que o script espera
          MARINETRAFFIC_API_KEY: ${{ secrets.MARINETRAFFIC_API_KEY }}

      # Passo 5: Faz o commit e push do novo arquivo de dados para o repositório
      # Este passo só será executado se o passo anterior (run_pipeline) tiver sido bem-sucedido
      - name: Commit e Push dos novos dados
        if: steps.run_pipeline.outcome == 'success'
        run: |
          echo "Pipeline executado com sucesso. Verificando por novos dados..."
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add poc_dados_frota.csv  # <-- CORREÇÃO AQUI
          # Só faz o commit se houver mudanças no arquivo
          git diff --staged --quiet || git commit -m "Atualização automática dos dados da frota"
          git push

